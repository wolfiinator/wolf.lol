<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wolf.lol</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="auth-claim-panel" class="panel">
      <h1>claim your wolf.lol domain</h1>
      <p class="muted">Sign in with Firebase, claim a number, and customize your profile page.</p>

      <div class="auth-row">
        <button id="login-button" class="btn primary">Sign in with Google</button>
        <button id="logout-button" class="btn" hidden>Sign out</button>
      </div>

      <form id="claim-form" class="claim-form">
        <label for="domain-input">Your domain number</label>
        <div class="domain-input-row">
          <span class="domain-prefix">wolfiinator.github.io/wolf.lol/</span>
          <input id="domain-input" type="text" inputmode="numeric" pattern="[0-9]+" placeholder="1" required />
        </div>
        <button class="btn primary" type="submit">Claim domain</button>
      </form>

      <p id="auth-claim-message" class="status"></p>
    </section>

    <section id="profile-panel" class="panel" hidden>
      <div class="profile-wrap" id="profile-card">
        <img id="profile-picture" src="assets/profile.gif" alt="profile picture" />
        <h2 id="display-name">unnamed wolf</h2>
        <p id="typewriter-bio"></p>
      </div>
      <p class="status" id="profile-link"></p>
    </section>

    <section id="editor-panel" class="panel" hidden>
      <h3>profile menu</h3>
      <p class="muted">Like guns.lol style customization. Badges are intentionally not added yet.</p>

      <form id="editor-form" class="editor-grid">
        <label>
          Name
          <input id="name-input" maxlength="40" required />
        </label>

        <label>
          Profile picture URL
          <input id="picture-input" type="url" placeholder="https://..." />
        </label>

        <label>
          Background URL (image/video)
          <input id="background-input" type="url" placeholder="https://..." />
        </label>

        <label>
          Bio #1
          <textarea id="bio1-input" rows="2" maxlength="180"></textarea>
        </label>

        <label>
          Bio #2
          <textarea id="bio2-input" rows="2" maxlength="180"></textarea>
        </label>

        <button class="btn primary" type="submit">Save profile</button>
      </form>
      <p id="editor-message" class="status"></p>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
